version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codebase_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: codebase_memory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    container_name: codebase_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
